{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RK Lucky Draw</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
body{
    background:#f4f7fc;
}

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:linear-gradient(180deg,#4f46e5,#7c3aed);
    padding-top:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.logo{
    color:white;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-bottom:30px;
}

.sidebar a{
    color:white;
    display:block;
    padding:15px 20px;
    text-decoration:none;
    margin:5px 10px;
    border-radius:10px;
    transition:0.3s;
    font-weight:500;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
    transform:translateX(5px);
}

.content{
    margin-left:270px;
    padding:25px;
}

.page-card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.hero{
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    padding:30px;
    border-radius:20px;
    margin-bottom:20px;
    text-align:center;
}
</style>

</head>

<body>

<div class="sidebar">

    <div class="logo">
        🏆 RK Lucky Draw
    </div>

    <a href="/">🏠 Dashboard</a>

<a href="/customers/">👥 Customers</a>

<a href="/search/">🔍 Search Customer</a>

<a href="/history/">📜 Payment History</a>

<a href="/unpaid/">❌ Unpaid Customers</a>

<a href="/admin/">⚙️ Admin Panel</a>

</div>

<div class="content">
    {% block content %}
    {% endblock %}
</div>
</html>
