{% extends 'base.html' %}

{% block content %}

<div class="page-card">

    <h2>✏ Edit Customer</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Customer Code</label>
        <input type="text"
               name="customer_code"
               value="{{ customer.customer_code }}"
               class="form-control mb-3">

        <label>Name</label>
        <input type="text"
               name="name"
               value="{{ customer.name }}"
               class="form-control mb-3">

        <label>Phone</label>
        <input type="text"
               name="phone"
               value="{{ customer.phone }}"
               class="form-control mb-3">

        <button type="submit"
                class="btn btn-success">
            Save Changes
        </button>

        <a href="/customers/"
           class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
